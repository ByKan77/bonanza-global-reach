<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 39 26">
  <defs>
    <!-- 5-pointed star: outer then inner points, radius 0.5 / 0.2 -->
    <polygon id="s" points="0,-0.5 0.12,0.16 0.48,-0.16 -0.12,0.16 0.29,0.4 -0.2,0 -0.29,0.4 0,-0.2 -0.48,-0.16 0.19,-0.06"/>
  </defs>
  <!-- 13 stripes -->
  <rect width="39" height="2" fill="#B22234"/>
  <rect y="2" width="39" height="2" fill="#fff"/>
  <rect y="4" width="39" height="2" fill="#B22234"/>
  <rect y="6" width="39" height="2" fill="#fff"/>
  <rect y="8" width="39" height="2" fill="#B22234"/>
  <rect y="10" width="39" height="2" fill="#fff"/>
  <rect y="12" width="39" height="2" fill="#B22234"/>
  <rect y="14" width="39" height="2" fill="#fff"/>
  <rect y="16" width="39" height="2" fill="#B22234"/>
  <rect y="18" width="39" height="2" fill="#fff"/>
  <rect y="20" width="39" height="2" fill="#B22234"/>
  <rect y="22" width="39" height="2" fill="#fff"/>
  <rect y="24" width="39" height="2" fill="#B22234"/>
  <!-- canton -->
  <rect width="15.6" height="14" fill="#3C3B6E"/>
  <!-- 9 stars -->
  <g fill="#fff">
    <use href="#s" transform="translate(2.6,2.8) scale(1.4)"/>
    <use href="#s" transform="translate(7.8,2.8) scale(1.4)"/>
    <use href="#s" transform="translate(13,2.8) scale(1.4)"/>
    <use href="#s" transform="translate(2.6,7) scale(1.4)"/>
    <use href="#s" transform="translate(7.8,7) scale(1.4)"/>
    <use href="#s" transform="translate(13,7) scale(1.4)"/>
    <use href="#s" transform="translate(2.6,11.2) scale(1.4)"/>
    <use href="#s" transform="translate(7.8,11.2) scale(1.4)"/>
    <use href="#s" transform="translate(13,11.2) scale(1.4)"/>
  </g>
</svg>
